{# templates/_feeling_modal.html #}
{# Modal for selecting a feeling/emotion to attach to a post #}

<div id="feeling-modal" class="modal hidden">
    <div class="modal-content max-w-md">
        <span class="close-button" onclick="closeModal('feeling-modal')">&times;</span>
        <h3 class="text-xl font-bold primary-text mb-4">How are you feeling?</h3>

        {# Search Box #}
        <div class="mb-4">
            <input type="text"
                   id="feeling-search"
                   placeholder="Search feelings..."
                   oninput="filterFeelings()"
                   class="w-full px-4 py-2 border rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 form-input">
        </div>

        {# Feelings Grid (Scrollable) #}
        <div id="feeling-list" class="overflow-y-auto max-h-80 mb-4">
            {# Populated by JS via renderFeelingsList() #}
            <div class="text-center secondary-text py-8">
                <p>Loading feelings...</p>
            </div>
        </div>

        {# Modal Footer #}
        <div class="flex items-center justify-end gap-3">
            <button type="button" onclick="closeModal('feeling-modal')"
                    class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-md hover:bg-gray-50 dark:hover:bg-gray-700 secondary-text">
                Cancel
            </button>
        </div>
    </div>
</div>
